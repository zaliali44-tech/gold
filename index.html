<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Signal Engine V2.1</title>

<style>

body{
background:#0e1428;
font-family:Arial;
color:white;
margin:0;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

h1{
color:#f6c453;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#151d3a;
padding:20px;
border-radius:12px;
}

.value{
font-size:28px;
font-weight:bold;
}

.buy{color:#32d583;}
.sell{color:#ff6b6b;}
.wait{color:#f3b75d;}

.level{
font-size:20px;
margin-top:6px;
}

.metric{
margin-top:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#283263;
color:white;
cursor:pointer;
}

input{
padding:10px;
width:100%;
margin-top:10px;
border-radius:8px;
border:none;
}

#tvchart{
height:650px;
}

</style>
</head>

<body>

<div class="container">

<h1>Gold Signal Engine 2.1</h1>

<div class="grid">

<div class="card">

<div id="tvchart"></div>

</div>

<div>

<div class="card">

<h3>API Key</h3>

<input id="api" placeholder="Paste TwelveData API Key">

<button onclick="run()">Run Analysis</button>

</div>

<div class="card">

<h3>Signal</h3>

<div id="signal" class="value wait">WAIT</div>

<div id="probability"></div>

<div class="metric">Trade Type: <span id="tradetype">--</span></div>

</div>

<div class="card">

<h3>Trade Levels</h3>

<div class="level">Entry: <span id="entry">--</span></div>
<div class="level">Stop: <span id="stop">--</span></div>
<div class="level">TP1: <span id="tp1">--</span></div>
<div class="level">TP2: <span id="tp2">--</span></div>

<div class="metric">Risk Reward: <span id="rr">--</span></div>

</div>

<div class="card">

<h3>Market State</h3>

<div class="metric">Session: <span id="session"></span></div>
<div class="metric">Volatility: <span id="volatility"></span></div>
<div class="metric">4H Trend: <span id="trend4"></span></div>
<div class="metric">1H Trend: <span id="trend1"></span></div>

</div>

</div>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({
symbol:"OANDA:XAUUSD",
interval:"60",
timezone:"Asia/Kuala_Lumpur",
theme:"dark",
style:"1",
container_id:"tvchart"
})

function ema(data,p){

let k=2/(p+1)
let ema=data[0]

for(let i=1;i<data.length;i++)
ema=data[i]*k+ema*(1-k)

return ema

}

function rsi(data,p=14){

let gains=0
let losses=0

for(let i=1;i<p;i++){

let diff=data[i]-data[i-1]

if(diff>0)gains+=diff
else losses+=Math.abs(diff)

}

let rs=gains/losses

return 100-(100/(1+rs))

}

function atr(data){

let total=0

for(let i=1;i<15;i++){

let high=data[i].high
let low=data[i].low

total+=high-low

}

return total/14

}

function session(){

let hour=new Date().getUTCHours()

if(hour<7)return "Asia"
if(hour<13)return "London"
return "New York"

}

async function candles(interval){

let key=document.getElementById("api").value

let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${interval}&apikey=${key}&outputsize=200`

let r=await fetch(url)
let j=await r.json()

return j.values.reverse().map(v=>({

close:Number(v.close),
high:Number(v.high),
low:Number(v.low)

}))

}

function trend(data){

let closes=data.map(x=>x.close)

let e20=ema(closes,20)
let e50=ema(closes,50)

let price=closes[closes.length-1]

if(price>e20 && e20>e50)return "Bullish"
if(price<e20 && e20<e50)return "Bearish"

return "Sideways"

}

function support(data){

let lows=data.slice(-30).map(x=>x.low)

return Math.min(...lows)

}

function resistance(data){

let highs=data.slice(-30).map(x=>x.high)

return Math.max(...highs)

}

function probability(score){

let base=50

return Math.min(95,Math.max(5,base+score*5))

}

function decision(tf15,tf1,tf4){

let score=0

if(tf4.trend=="Bullish")score+=3
if(tf4.trend=="Bearish")score-=3

if(tf1.trend=="Bullish")score+=2
if(tf1.trend=="Bearish")score-=2

let trade="WAIT"
let type="None"

if(score>=4){trade="BUY";type="Pullback"}
if(score<=-4){trade="SELL";type="Breakdown"}

let entry=tf1.price

let stop,tp1,tp2

let atrv=tf1.atr

if(trade=="BUY"){

stop=entry-atrv*1.2
tp1=entry+atrv*1.5
tp2=entry+atrv*3

}

if(trade=="SELL"){

stop=entry+atrv*1.2
tp1=entry-atrv*1.5
tp2=entry-atrv*3

}

let rr=Math.abs(tp1-entry)/Math.abs(entry-stop)

return{

trade,
type,
entry,
stop,
tp1,
tp2,
rr,
prob:probability(score)

}

}

async function run(){

let m15=await candles("15min")
let h1=await candles("1h")
let h4=await candles("4h")

let tf15={
trend:trend(m15),
price:m15[m15.length-1].close,
atr:atr(m15)
}

let tf1={
trend:trend(h1),
price:h1[h1.length-1].close,
atr:atr(h1)
}

let tf4={
trend:trend(h4),
price:h4[h4.length-1].close,
atr:atr(h4)
}

let d=decision(tf15,tf1,tf4)

document.getElementById("signal").innerText=d.trade
document.getElementById("signal").className=d.trade.toLowerCase()

document.getElementById("probability").innerText="Probability: "+d.prob+"%"

document.getElementById("tradetype").innerText=d.type

document.getElementById("entry").innerText=d.entry.toFixed(2)
document.getElementById("stop").innerText=d.stop.toFixed(2)
document.getElementById("tp1").innerText=d.tp1.toFixed(2)
document.getElementById("tp2").innerText=d.tp2.toFixed(2)

document.getElementById("rr").innerText=d.rr.toFixed(2)

document.getElementById("trend4").innerText=tf4.trend
document.getElementById("trend1").innerText=tf1.trend

document.getElementById("session").innerText=session()

document.getElementById("volatility").innerText=tf1.atr.toFixed(2)

}

</script>

</body>
</html>
